<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>에너지 인프라 대시보드</title>
<!-- 차트: TradingView lightweight-charts (CDN 1줄, 버전 고정, 빌드 없음) -->
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --border:#30363d; --txt:#e6edf3; --dim:#8b949e;
  --green:#3fb950; --green-bg:rgba(63,185,80,.13);
  --red:#f85149; --red-bg:rgba(248,81,73,.13);
  --orange:#d29922; --orange-bg:rgba(210,153,34,.15);
  --blue:#58a6ff; --purple:#bc8cff;
}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);
  font:13px/1.45 -apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
header{display:flex;flex-wrap:wrap;gap:14px;align-items:center;
  padding:10px 16px;border-bottom:1px solid var(--border);background:var(--panel);
  position:sticky;top:0;z-index:10}
header h1{font-size:15px;margin:0 8px 0 0}
.bench{display:flex;gap:6px;align-items:baseline;padding:3px 10px;border:1px solid var(--border);border-radius:6px}
.bench .nm{color:var(--dim);font-size:11px}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);color:var(--dim)}
.badge.open{color:var(--green);border-color:var(--green)}
.badge.live{color:var(--red);border-color:var(--red)}
#updated{margin-left:auto;color:var(--dim);font-size:11px}
/* 변화 피드 (유일한 가로 스크롤 요소) */
.feed{display:flex;gap:10px;align-items:center;padding:6px 16px;border-bottom:1px solid var(--border);
  background:var(--panel);overflow-x:auto;white-space:nowrap;scrollbar-width:thin;font-size:12px}
.feed::-webkit-scrollbar{height:5px} .feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.feed-lbl{color:var(--dim);font-size:11px;flex:0 0 auto;letter-spacing:.5px}
.feed-quiet{color:var(--green)}
.feed-item{flex:0 0 auto;cursor:pointer;padding:2px 9px;border:1px solid var(--border);border-radius:11px;color:var(--dim)}
.feed-item:hover{border-color:var(--blue);color:var(--txt)}
.feed-item b{color:var(--txt);margin-right:5px}
.controls{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px}
.chip{cursor:pointer;font-size:12px;padding:3px 10px;border-radius:12px;
  border:1px solid var(--border);background:transparent;color:var(--dim)}
.chip.on{color:var(--txt);border-color:var(--blue);background:rgba(88,166,255,.12)}
#viewtabs .chip.on{border-color:var(--txt)}
/* 그룹 요약 스트립 */
.summary{display:flex;flex-wrap:wrap;gap:6px;padding:2px 16px 8px}
.gsum{cursor:pointer;display:inline-flex;gap:7px;align-items:baseline;font-size:11px;
  padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--txt)}
.gsum.off{opacity:.4}
.gsum .gn{color:var(--dim)} .gsum .gc{color:var(--dim);font-size:10px}
table{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
th,td{padding:5px 9px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
th{position:sticky;top:46px;background:var(--panel);color:var(--dim);font-size:11px;
  cursor:pointer;user-select:none;z-index:5}
th:hover{color:var(--txt)} th .arr{color:var(--blue)}
td:first-child,th:first-child,td:nth-child(2),th:nth-child(2){text-align:left}
tbody tr[data-sym]{cursor:pointer}
tr.r-up{box-shadow:inset 3px 0 0 var(--green)}
tr.r-dn{box-shadow:inset 3px 0 0 var(--red)}
tr.r-vol{box-shadow:inset 3px 0 0 var(--orange)}
tr[data-sym]:hover td{background:rgba(255,255,255,.03)}
tr.open td{background:rgba(88,166,255,.07)}
.sym{color:var(--dim);font-size:11px;margin-left:5px}
.spark{vertical-align:middle;margin-left:8px}
.grp{font-size:11px;color:var(--dim)}
.up{color:var(--green)} .dn{color:var(--red)}
.c-strong-up{background:var(--green-bg);color:var(--green);font-weight:600}
.c-strong-dn{background:var(--red-bg);color:var(--red);font-weight:600}
.c-hot{background:var(--orange-bg);color:var(--orange);font-weight:600}
.c-cold{color:var(--blue);font-weight:600}
.c-near{background:var(--green-bg);color:var(--green)}
.c-deep{background:var(--red-bg);color:var(--red)}
.c-warn{color:var(--red)}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}
.tag.earn{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid var(--purple)}
.tag.rec{background:rgba(88,166,255,.12);color:var(--blue)}
.note{color:var(--dim);font-size:11px;max-width:260px;overflow:hidden;text-overflow:ellipsis}
.stale{opacity:.45}
/* 차트 패널 */
tr.chart-row td{padding:0;background:var(--bg)}
.chart-card{padding:0}
.chart-wrap{padding:8px 16px 14px}
.chart-head{display:flex;flex-wrap:wrap;gap:12px;align-items:baseline;margin-bottom:6px;color:var(--dim);font-size:11px}
.chart-head b{color:var(--txt);font-size:13px}
.chart-head .lg{display:inline-flex;align-items:center;gap:4px}
.chart-head .lg i{width:14px;height:0;border-top:2px solid;display:inline-block}
.ch-main{width:100%} .ch-rsi{width:100%;margin-top:2px}
.chart-msg{padding:24px 16px;color:var(--dim);font-size:12px}
/* 히트맵 */
.heatmap{padding:4px 16px 10px;display:none}
.hm-group{margin-bottom:6px}
.hm-label{font-size:11px;color:var(--dim);margin-bottom:2px}
.hm-label b{color:var(--txt);font-size:12px;margin-right:5px}
.hm-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:3px}
.tile{cursor:pointer;border:1px solid var(--border);border-radius:5px;padding:4px 8px;min-height:38px;
  display:flex;flex-direction:column;justify-content:center;gap:0}
.tile:hover{border-color:var(--txt)}
.tile-sym{font-weight:600;font-size:12px}
.tile-pct{font-size:13px;font-weight:600}
.tile-rsi{font-size:10px;color:rgba(230,237,243,.7)}
/* 모바일 카드 */
#cards{display:none;padding:4px 12px 20px}
.card{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;
  border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:7px;background:var(--panel)}
.card.open{border-color:var(--blue)}
.card.r-up{box-shadow:inset 3px 0 0 var(--green)} .card.r-dn{box-shadow:inset 3px 0 0 var(--red)}
.card.r-vol{box-shadow:inset 3px 0 0 var(--orange)}
.card-sub{color:var(--dim);font-size:11px;margin-top:3px}
.card-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.card-pct{font-size:14px;font-weight:600}
.cb{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:3px}
.cb.hot{background:var(--orange-bg);color:var(--orange)} .cb.cold{color:var(--blue);border:1px solid var(--blue)}
.legend{padding:6px 16px 14px;color:var(--dim);font-size:11px}
.legend span{margin-right:14px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
@media(max-width:640px){
  header{gap:8px;padding:8px 12px} header h1{font-size:14px}
  .note{display:none}
}
</style>
</head>
<body>
<header>
  <h1>⚡ 에너지 인프라</h1>
  <div id="benchbar"></div>
  <span class="badge" id="us-mkt">US</span>
  <span class="badge" id="kr-mkt">KR</span>
  <span class="badge" id="mode-badge" title="GitHub Actions가 장중 10분 주기로 갱신 (큐 상황에 따라 5~15분 지연)">정적 모드</span>
  <span id="updated">로딩 중…</span>
</header>
<div class="feed" id="feed"></div>
<div class="controls" id="viewtabs">
  <button class="chip" data-v="table">표</button>
  <button class="chip" data-v="heat">히트맵</button>
  <button class="chip" id="fundToggle" title="dartlab 공시 기반 펀더멘털 (주 1회 갱신) — 영업이익률·부채비율·신용등급">펀더멘털</button>
</div>
<div class="controls" id="mktchips">
  <button class="chip on" data-m="ALL">전체</button>
  <button class="chip" data-m="US">미국</button>
  <button class="chip" data-m="KR">한국</button>
</div>
<div class="summary" id="summary"></div>
<div class="controls" id="grpchips"></div>
<table id="tbl">
  <thead><tr id="hdr"></tr></thead>
  <tbody id="body"></tbody>
</table>
<div id="cards"></div>
<div class="heatmap" id="heatmap"></div>
<div class="legend">
  <span><span class="dot" style="background:var(--green)"></span>급등/고점권(-5% 이내)</span>
  <span><span class="dot" style="background:var(--red)"></span>급락/고점-20%/200일선 이탈</span>
  <span><span class="dot" style="background:var(--orange)"></span>거래량 2배+ / RSI 70+</span>
  <span><span class="dot" style="background:var(--purple)"></span>어닝 D-7 이내</span>
  <span>행 클릭 → 캔들/RSI/거래량 차트</span>
</div>
<script>
// ── 모드 자동 감지 ──
// BACKEND_URL: 항상 켜진 LIVE 백엔드 주소. null이면 100% 기존 동작(정적/로컬), 끊기면 자동 강등.
const BACKEND_URL = null;  // 예: "https://your-backend.example.com"
const LOCAL = location.port === "8765";
const REFRESH_MS = LOCAL ? 5000 : 60000;
let live = false;  // SSE 연결 성공 시 true
const safeSym = s => s.replace("^", "_");
const dataUrl = () => live ? (BACKEND_URL + "/snapshot")
  : LOCAL ? "/api/data" : ("data.json?ts=" + Date.now());
const histUrl = s => live ? (BACKEND_URL + "/history/" + safeSym(s))
  : LOCAL ? ("/api/history/" + encodeURIComponent(s)) : ("history/" + safeSym(s) + ".json");

const COLS=[
 ["name","종목"],["group","그룹"],["price","현재가"],["dayPct","등락%"],
 ["from52h","52주고점比"],["rsi","RSI"],["volX","거래량x"],
 ["vs200","200일선比"],["fper","fPER"],["growth","내재성장%"],
 ["dEarn","어닝"],["note","비고"]
];
// 펀더멘털 토글 ON 시 추가되는 칼럼 (dartlab 공시 기반)
const FUND_COLS=[["opMargin","영업이익률"],["debtRatio","부채비율"],["creditGrade","신용등급"]];
let FUND={}, fundMode=localStorage.getItem("fund")==="1";
const activeCols=()=>fundMode?COLS.concat(FUND_COLS):COLS;
let DATA=[], BENCH=[], sortKey=localStorage.getItem("sk")||"dayPct",
    sortDir=+(localStorage.getItem("sd")||-1),
    mkt=localStorage.getItem("mk")||"ALL",
    view=localStorage.getItem("vw")||"table",
    grps=new Set(JSON.parse(localStorage.getItem("gs")||"[]"));
let mobile=window.matchMedia("(max-width:640px)").matches;
window.matchMedia("(max-width:640px)").addEventListener("change",e=>{mobile=e.matches;render();});

function fmtP(v,cur){if(v==null)return"—";
 const p=cur==="KRW"?v.toLocaleString("ko-KR",{maximumFractionDigits:0})
   :v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
 return p+(cur==="KRW"?"₩":cur==="USD"?"$":"");}
function pct(v,d=1){return v==null?"—":(v>0?"+":"")+v.toFixed(d)+"%";}
function n1(v){return v==null?"—":v.toFixed(1);}

function sparkSvg(arr){
 if(!arr||arr.length<2)return"";
 const w=64,h=18,min=Math.min(...arr),max=Math.max(...arr),rng=(max-min)||1;
 const pts=arr.map((v,i)=>`${(i/(arr.length-1)*w).toFixed(1)},${(h-(v-min)/rng*h).toFixed(1)}`).join(" ");
 const up=arr[arr.length-1]>=arr[0];
 return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`
  +`<polyline points="${pts}" fill="none" stroke="${up?'var(--green)':'var(--red)'}" stroke-width="1.2"/></svg>`;
}

function derive(r){
 r.from52h=(r.price&&r.hi52)?(r.price/r.hi52-1)*100:null;
 r.vs200=(r.price&&r.sma200)?(r.price/r.sma200-1)*100:null;
 r.vs50=(r.price&&r.sma50)?(r.price/r.sma50-1)*100:null;
 r.volX=(r.volume&&r.avgVol20)?r.volume/r.avgVol20:null;
 if(r.earnings){const d=Math.ceil((new Date(r.earnings+"T00:00:00")-Date.now())/864e5);
   r.dEarn=d>=0?d:null;}else r.dEarn=null;
 return r;}

function rowClass(r){
 if(r.dayPct!=null&&r.dayPct<=-3)return"r-dn";
 if(r.dayPct!=null&&r.dayPct>=3)return"r-up";
 if(r.volX!=null&&r.volX>=2&&r.marketOpen)return"r-vol";
 return"";}

function cell(k,r){
 switch(k){
  case"name":{let t=`<b>${r.name}</b><span class="sym">${r.symbol}</span>`;
   if((r.note||"").includes("[추천]"))t+=`<span class="tag rec">추천</span>`;
   t+=sparkSvg(r.spark);
   return t;}
  case"group":return`<span class="grp">${r.group}</span>`;
  case"price":return fmtP(r.price,r.currency);
  case"dayPct":{let c=r.dayPct==null?"":r.dayPct>=3?"c-strong-up":r.dayPct<=-3?"c-strong-dn":r.dayPct>0?"up":r.dayPct<0?"dn":"";
   return`<span class="${c}">${pct(r.dayPct,2)}</span>`;}
  case"from52h":{let c=r.from52h==null?"":r.from52h>=-5?"c-near":r.from52h<=-20?"c-deep":"";
   return`<span class="${c}">${pct(r.from52h)}</span>`;}
  case"rsi":{let c=r.rsi==null?"":r.rsi>=70?"c-hot":r.rsi<=30?"c-cold":"";
   return`<span class="${c}">${n1(r.rsi)}</span>`;}
  case"volX":{let c=r.volX!=null&&r.volX>=3?"c-strong-up":r.volX!=null&&r.volX>=2?"c-hot":"";
   return`<span class="${c}">${r.volX==null?"—":r.volX.toFixed(1)+"x"}</span>`;}
  case"vs200":{let c=r.vs200!=null&&r.vs200<0?"c-warn":"";
   return`<span class="${c}">${pct(r.vs200)}</span>`;}
  case"fper":{const v=r.perRel??r.fper;return v==null?"—":v.toFixed(1);}
  case"growth":return r.growth==null?"—":"+"+r.growth+"%";
  case"dEarn":return r.dEarn==null?"—":r.dEarn<=7?`<span class="tag earn">D-${r.dEarn}</span>`:"D-"+r.dEarn;
  case"note":return`<span class="note" title="${r.note||""}">${(r.note||"").replace("[추천] ","")}</span>`;
  case"opMargin":return r.opMargin==null?"—":`<span class="${r.opMargin>=0?'up':'dn'}">${r.opMargin.toFixed(1)}%${r.opMarginDir||""}</span>`;
  case"debtRatio":return r.debtRatio==null?"—":`<span class="${r.debtRatio>=200?'c-warn':''}">${r.debtRatio.toFixed(0)}%</span>`;
  case"creditGrade":return r.creditGrade?`<span class="tag rec">${r.creditGrade}</span>`:"—";
 }return"";}

// 시장 필터 적용된 행
function visibleRows(){return DATA.filter(r=>mkt==="ALL"||r.market===mkt);}

function toggleGroup(g){
 const allG=[...new Set(DATA.map(r=>r.group))];
 if(grps.size===0)grps=new Set([g]);
 else if(grps.has(g))grps.delete(g);
 else grps.add(g);
 if(grps.size===allG.length)grps.clear();
 localStorage.setItem("gs",JSON.stringify([...grps]));render();
}

// ── 변화 피드: 트리거 우선순위 |등락|≥3 > 거래량2x > RSI70/30 > 고점±  > 어닝D-7 ──
function triggers(){
 const res=[];
 for(const r of visibleRows()){
  const tags=[]; let pr=9;
  if(r.dayPct!=null&&Math.abs(r.dayPct)>=3){tags.push(`<b class="${r.dayPct>0?'up':'dn'}">${pct(r.dayPct,1)}</b>`);pr=Math.min(pr,1);}
  if(r.volX!=null&&r.volX>=2){tags.push(`거래량 ${r.volX.toFixed(1)}x`);pr=Math.min(pr,2);}
  if(r.rsi!=null&&(r.rsi>=70||r.rsi<=30)){tags.push(`RSI ${n1(r.rsi)}`);pr=Math.min(pr,3);}
  if(r.from52h!=null&&(r.from52h>=-5||r.from52h<=-20)){tags.push(`고점 ${pct(r.from52h,1)}`);pr=Math.min(pr,4);}
  if(r.dEarn!=null&&r.dEarn<=7){tags.push(`<span class="tag earn">D-${r.dEarn}</span>`);pr=Math.min(pr,5);}
  if(tags.length)res.push({sym:r.symbol,short:r.symbol.split(".")[0],tags,pr,mag:Math.abs(r.dayPct||0)});
 }
 res.sort((a,b)=>a.pr-b.pr||b.mag-a.mag);
 return res;
}

function renderFeed(){
 const t=triggers(), el=document.getElementById("feed");
 if(!t.length){el.innerHTML=`<span class="feed-lbl">지금</span><span class="feed-quiet">조용함 🟢</span>`;return;}
 el.innerHTML=`<span class="feed-lbl">지금</span>`+t.slice(0,14).map(x=>
  `<span class="feed-item" data-sym="${x.sym}"><b>${x.short}</b>${x.tags.join(" · ")}</span>`).join("");
 el.querySelectorAll(".feed-item").forEach(e=>e.onclick=()=>jumpTo(e.dataset.sym));
}

function renderSummary(){
 const el=document.getElementById("summary");
 const groups=[...new Set(visibleRows().map(r=>r.group))];
 el.innerHTML=groups.map(g=>{
  const rows=visibleRows().filter(r=>r.group===g&&r.dayPct!=null);
  if(!rows.length)return"";
  const avg=rows.reduce((s,r)=>s+r.dayPct,0)/rows.length;
  const up=rows.filter(r=>r.dayPct>0).length, dn=rows.filter(r=>r.dayPct<0).length;
  const on=grps.size===0||grps.has(g);
  return `<button class="gsum ${on?"":"off"}" data-g="${g}"><span class="gn">${g}</span>`
   +`<span class="${avg>0?"up":avg<0?"dn":""}">${pct(avg,1)}</span>`
   +`<span class="gc">▲${up} ▼${dn}</span></button>`;
 }).join("");
 el.querySelectorAll(".gsum").forEach(b=>b.onclick=()=>toggleGroup(b.dataset.g));
}

function heatColor(p){
 if(p==null)return"#161b22";
 const bg=[13,17,23], x=Math.max(-3,Math.min(3,p))/3;
 const c=x>=0?[63,185,80]:[248,81,73], a=0.12+0.6*Math.abs(x);
 return `rgb(${c.map((v,i)=>Math.round(v*a+bg[i]*(1-a))).join(",")})`;
}

function renderHeat(){
 const el=document.getElementById("heatmap");
 const groups=[...new Set(DATA.map(r=>r.group))];
 let html="";
 for(const g of groups){
  const rows=visibleRows().filter(r=>r.group===g);
  if(!rows.length)continue;
  rows.sort((a,b)=>(b.dayPct??-99)-(a.dayPct??-99));
  html+=`<div class="hm-group"><div class="hm-label"><b>${g}</b>${rows.length}종목</div><div class="hm-tiles">`
   +rows.map(r=>`<div class="tile" data-sym="${r.symbol}" style="background:${heatColor(r.dayPct)}">`
    +`<div class="tile-sym">${r.symbol.split(".")[0]}</div>`
    +`<div class="tile-pct">${pct(r.dayPct,1)}</div>`
    +`<div class="tile-rsi">RSI ${n1(r.rsi)}</div></div>`).join("")
   +`</div></div>`;
 }
 el.innerHTML=html;
 el.querySelectorAll(".tile").forEach(t=>t.onclick=()=>jumpTo(t.dataset.sym));
}

function renderCards(rows){
 const el=document.getElementById("cards");
 el.innerHTML=rows.map(r=>{
  const dc=r.dayPct==null?"":r.dayPct>0?"up":"dn";
  let badges="";
  if(r.volX!=null&&r.volX>=2)badges+=`<span class="cb hot">${r.volX.toFixed(1)}x</span>`;
  if(r.rsi!=null&&r.rsi>=70)badges+=`<span class="cb hot">RSI${r.rsi.toFixed(0)}</span>`;
  else if(r.rsi!=null&&r.rsi<=30)badges+=`<span class="cb cold">RSI${r.rsi.toFixed(0)}</span>`;
  if(r.dEarn!=null&&r.dEarn<=7)badges+=`<span class="tag earn">D-${r.dEarn}</span>`;
  return `<div class="card ${rowClass(r)} ${r.symbol===openSym?'open':''} ${r.stale?'stale':''}" data-sym="${r.symbol}">`
   +`<div class="card-l"><div><b>${r.name}</b><span class="sym">${r.symbol.split(".")[0]}</span></div>`
   +`<div class="card-sub">${fmtP(r.price,r.currency)} ${badges}</div></div>`
   +`<div class="card-r">${sparkSvg(r.spark)}<div class="card-pct ${dc}">${pct(r.dayPct,1)}</div></div></div>`;
 }).join("");
 el.querySelectorAll(".card[data-sym]").forEach(c=>c.onclick=()=>toggleChart(c.dataset.sym));
}

function sortedRows(){
 let rows=visibleRows().filter(r=>grps.size===0||grps.has(r.group));
 rows.sort((a,b)=>{
  let x=a[sortKey],y=b[sortKey];
  if(typeof x==="string")return sortDir*String(x).localeCompare(String(y),"ko");
  if(x==null)return 1; if(y==null)return -1;
  return sortDir*(x-y);});
 return rows;
}

function render(){
 // 뷰 탭 + 시장 칩 active
 document.querySelectorAll("#viewtabs .chip").forEach(b=>{
  b.classList.toggle("on",b.dataset.v===view);
  b.onclick=()=>{view=b.dataset.v;localStorage.setItem("vw",view);render();};});
 document.querySelectorAll("#mktchips .chip").forEach(b=>{
  b.classList.toggle("on",b.dataset.m===mkt);
  b.onclick=()=>{mkt=b.dataset.m;localStorage.setItem("mk",mkt);render();};});
 const ft=document.getElementById("fundToggle");
 ft.classList.toggle("on",fundMode);
 ft.onclick=()=>{fundMode=!fundMode;localStorage.setItem("fund",fundMode?"1":"0");render();};

 const heat=view==="heat";
 document.getElementById("heatmap").style.display=heat?"block":"none";
 document.querySelector(".legend").style.display=heat?"none":"block";
 document.getElementById("summary").style.display=heat?"none":"flex";
 document.getElementById("grpchips").style.display=heat?"none":"flex";
 document.getElementById("tbl").style.display=heat||mobile?"none":"table";
 document.getElementById("cards").style.display=(!heat&&mobile)?"block":"none";

 renderFeed();
 if(heat){renderHeat();placeChart();return;}
 renderSummary();

 // 그룹칩
 const allG=[...new Set(DATA.map(r=>r.group))];
 const gc=document.getElementById("grpchips");
 gc.innerHTML=allG.map(g=>`<button class="chip ${grps.size===0||grps.has(g)?"on":""}" data-g="${g}">${g}</button>`).join("");
 gc.querySelectorAll(".chip").forEach(b=>b.onclick=()=>toggleGroup(b.dataset.g));

 const rows=sortedRows();
 if(mobile){renderCards(rows);placeChart();return;}

 // 데스크톱 표
 const cols=activeCols();
 document.getElementById("hdr").innerHTML=cols.map(([k,l])=>
  `<th data-k="${k}">${l}${k===sortKey?`<span class="arr">${sortDir>0?" ▲":" ▼"}</span>`:""}</th>`).join("");
 document.querySelectorAll("#hdr th").forEach(th=>th.onclick=()=>{
  const k=th.dataset.k;
  if(k===sortKey)sortDir*=-1;else{sortKey=k;sortDir=-1;}
  localStorage.setItem("sk",sortKey);localStorage.setItem("sd",sortDir);render();});
 document.getElementById("body").innerHTML=rows.map(r=>
  `<tr data-sym="${r.symbol}" class="${rowClass(r)} ${r.stale?"stale":""} ${r.symbol===openSym?"open":""}">`
  +cols.map(([k])=>`<td>${cell(k,r)}</td>`).join("")+`</tr>`).join("");
 document.querySelectorAll("#body tr[data-sym]").forEach(tr=>
  tr.onclick=e=>{if(e.target.closest("a"))return;toggleChart(tr.dataset.sym);});
 placeChart();
}

function jumpTo(sym){
 if(view!=="table"){view="table";localStorage.setItem("vw",view);}
 render();
 openChart(sym);
 const sel=mobile?".card[data-sym]":"#body tr[data-sym]";
 const row=[...document.querySelectorAll(sel)].find(x=>x.dataset.sym===sym);
 if(row)row.scrollIntoView({behavior:"smooth",block:"center"});
}

// ── 차트 (lightweight-charts) ──────────────────────────────────────
const HIST_CACHE={};
let openSym=null, builtSym=null, chartHost=null, _destroy=()=>{};

function toggleChart(sym){ if(openSym===sym) closeChart(); else openChart(sym); }

function clearChartWrap(){document.querySelectorAll("tr.chart-row,.chart-card").forEach(e=>e.remove());}

function closeChart(){
 _destroy(); _destroy=()=>{};
 clearChartWrap();
 document.querySelectorAll(".open").forEach(e=>e.classList.remove("open"));
 openSym=null; builtSym=null;
}

function openChart(sym){
 if(openSym&&openSym!==sym){_destroy();_destroy=()=>{};builtSym=null;}
 openSym=sym;
 placeChart();
}

function placeChart(){
 if(!openSym)return;
 const sel=mobile?".card[data-sym]":"#body tr[data-sym]";
 const anchor=[...document.querySelectorAll(sel)].find(x=>x.dataset.sym===openSym);
 clearChartWrap();
 if(!anchor)return;  // 필터/뷰로 가려진 경우 — 차트는 메모리 유지
 anchor.classList.add("open");
 if(!chartHost){chartHost=document.createElement("div");chartHost.className="chart-wrap";}
 let wrap;
 if(mobile){wrap=document.createElement("div");wrap.className="chart-card";wrap.appendChild(chartHost);}
 else{wrap=document.createElement("tr");wrap.className="chart-row";
  const td=document.createElement("td");td.colSpan=activeCols().length;td.appendChild(chartHost);wrap.appendChild(td);}
 anchor.after(wrap);  // 노드 이동 — 차트 인스턴스/줌 보존
 if(builtSym!==openSym) buildChart(openSym);
}

async function buildChart(sym){
 builtSym=sym;
 chartHost.innerHTML='<div class="chart-msg">차트 로딩…</div>';
 let h;
 try{ h=await loadHist(sym); }
 catch(e){ chartHost.innerHTML='<div class="chart-msg">히스토리 로드 실패 — 잠시 후 다시 시도</div>'; builtSym=null; return; }
 if(!h){ chartHost.innerHTML='<div class="chart-msg">히스토리 미생성 — history 워크플로우 실행 필요</div>'; return; }
 if(builtSym!==sym)return;
 chartHost.innerHTML='';
 const nm=(DATA.find(r=>r.symbol===sym)||{}).name||sym;
 const head=document.createElement("div");head.className="chart-head";
 head.innerHTML=`<b>${nm}</b><span>${sym}</span>`
  +`<span class="lg"><i style="border-color:var(--blue)"></i>SMA50</span>`
  +`<span class="lg"><i style="border-color:var(--purple)"></i>SMA200</span>`
  +`<span class="lg"><i style="border-color:var(--orange)"></i>RSI(14)</span>`;
 const main=document.createElement("div");main.className="ch-main";
 const rsiEl=document.createElement("div");rsiEl.className="ch-rsi";
 chartHost.appendChild(head);chartHost.appendChild(main);chartHost.appendChild(rsiEl);

 const LC=LightweightCharts;
 const base={
  layout:{background:{color:"#0d1117"},textColor:"#8b949e",fontSize:11},
  grid:{vertLines:{color:"rgba(48,54,61,.35)"},horzLines:{color:"rgba(48,54,61,.35)"}},
  timeScale:{borderColor:"#30363d",rightOffset:2},
  rightPriceScale:{borderColor:"#30363d"},
  crosshair:{mode:LC.CrosshairMode.Normal},
  autoSize:true,
 };
 const mc=LC.createChart(main,{...base,height:280});
 const rc=LC.createChart(rsiEl,{...base,height:96,timeScale:{...base.timeScale,visible:false}});
 const t=d=>d.slice(0,4)+"-"+d.slice(4,6)+"-"+d.slice(6,8);

 const candle=mc.addCandlestickSeries({upColor:"#3fb950",downColor:"#f85149",
  borderUpColor:"#3fb950",borderDownColor:"#f85149",wickUpColor:"#3fb950",wickDownColor:"#f85149"});
 candle.setData(h.dates.map((d,i)=>({time:t(d),open:h.open[i],high:h.high[i],low:h.low[i],close:h.close[i]})));
 const ln=c=>mc.addLineSeries({color:c,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
 ln("#58a6ff").setData(h.dates.map((d,i)=>({time:t(d),value:h.sma50[i]})).filter(p=>p.value!=null));
 ln("#bc8cff").setData(h.dates.map((d,i)=>({time:t(d),value:h.sma200[i]})).filter(p=>p.value!=null));
 const vol=mc.addHistogramSeries({priceScaleId:"vol",priceFormat:{type:"volume"},lastValueVisible:false,priceLineVisible:false});
 mc.priceScale("vol").applyOptions({scaleMargins:{top:0.82,bottom:0}});
 vol.setData(h.dates.map((d,i)=>({time:t(d),value:h.volume[i],
  color:h.close[i]>=h.open[i]?"rgba(63,185,80,.45)":"rgba(248,81,73,.45)"})));

 const rsi=rc.addLineSeries({color:"#d29922",lineWidth:1,priceLineVisible:false,lastValueVisible:false});
 rsi.setData(h.dates.map((d,i)=>({time:t(d),value:h.rsi[i]})).filter(p=>p.value!=null));
 rsi.createPriceLine({price:70,color:"rgba(248,81,73,.5)",lineWidth:1,lineStyle:2});
 rsi.createPriceLine({price:30,color:"rgba(88,166,255,.5)",lineWidth:1,lineStyle:2});

 let syncing=false;
 const link=(a,b)=>a.timeScale().subscribeVisibleLogicalRangeChange(r=>{
  if(syncing||!r)return;syncing=true;b.timeScale().setVisibleLogicalRange(r);syncing=false;});
 link(mc,rc);link(rc,mc);
 mc.timeScale().fitContent();
 _destroy=()=>{try{mc.remove();}catch(e){}try{rc.remove();}catch(e){}_destroy=()=>{};};
}

async function loadHist(sym){
 if(sym in HIST_CACHE) return HIST_CACHE[sym];
 const res=await fetch(histUrl(sym),{cache:"no-store"});
 if(!res.ok){ if(res.status===404){HIST_CACHE[sym]=null;return null;} throw new Error("HTTP "+res.status); }
 const j=await res.json(); HIST_CACHE[sym]=j; return j;
}

function mergeFund(r){
 const f=FUND[r.symbol];
 if(f){r.opMargin=f.opMargin;r.opMarginDir=f.opMarginDir;r.debtRatio=f.debtRatio;
  r.creditGrade=f.creditGrade;r.revenueGrowth=f.revenueGrowth;r.perRel=f.per_relative;}
 return r;
}
function renderBench(){
 document.getElementById("benchbar").innerHTML=(BENCH||[]).map(b=>{
  const p=b.price&&b.prevClose?(b.price/b.prevClose-1)*100:b.dayPct!=null?b.dayPct:null;
  return`<span class="bench"><span class="nm">${b.name}</span><span class="${p>0?"up":p<0?"dn":""}">${pct(p,2)}</span></span>`;
 }).join(" ");
}
function updateBadges(){
 const us=DATA.find(r=>r.market==="US"&&r.marketOpen), kr=DATA.find(r=>r.market==="KR"&&r.marketOpen);
 document.getElementById("us-mkt").className="badge"+(us?" open":"");
 document.getElementById("us-mkt").textContent="US "+(us?"장중":"휴장");
 document.getElementById("kr-mkt").className="badge"+(kr?" open":"");
 document.getElementById("kr-mkt").textContent="KR "+(kr?"장중":"휴장");
 const mb=document.getElementById("mode-badge");
 if(live){mb.textContent="LIVE 🔴";mb.className="badge live";mb.title="실시간 백엔드 연결됨 (SSE)";}
 else{mb.textContent=LOCAL?"로컬 실시간":"정적 모드";mb.className="badge";}
}
function stamp(ts){
 document.getElementById("updated").textContent=
  ts?(live?"LIVE ":LOCAL?"갱신 ":"데이터 기준 ")+new Date(ts).toLocaleString("ko-KR"):"수집 중…";
}

async function refresh(){
 try{
  const d=await(await fetch(dataUrl(),{cache:"no-store"})).json();
  DATA=d.rows.map(derive).map(mergeFund);
  BENCH=d.bench||[];
  renderBench(); updateBadges();
  stamp(d.updated?d.updated*1000:0);
  render();
 }catch(e){
  if(live){degrade();return;}
  document.getElementById("updated").textContent=LOCAL?"서버 연결 끊김":"data.json 로드 실패 — Actions 첫 실행 전일 수 있음";
 }
}

// ── LIVE 모드 (SSE) — BACKEND_URL 설정 시에만 동작 ──────────────────
let es=null, staticTimer=null, retryTimer=null;
function startStatic(){ if(staticTimer)return; refresh(); staticTimer=setInterval(refresh,REFRESH_MS); }
function stopStatic(){ if(staticTimer){clearInterval(staticTimer);staticTimer=null;} }

function applyRows(changed){
 const bySym={}; DATA.forEach(r=>bySym[r.symbol]=r);
 let benchChanged=false;
 changed.forEach(c=>{
  if(c.symbol in bySym){Object.assign(bySym[c.symbol],c);derive(bySym[c.symbol]);mergeFund(bySym[c.symbol]);}
  else{const bi=BENCH.findIndex(b=>b.symbol===c.symbol);if(bi>=0){Object.assign(BENCH[bi],c);benchChanged=true;}}
 });
 if(benchChanged)renderBench();
 updateBadges(); stamp(Date.now()); render();
}

async function connectLive(){
 try{
  const d=await(await fetch(BACKEND_URL+"/snapshot",{cache:"no-store"})).json();
  live=true; stopStatic();
  DATA=d.rows.map(derive).map(mergeFund); BENCH=d.bench||[];
  renderBench(); updateBadges(); stamp(d.updated?d.updated*1000:Date.now()); render();
  es=new EventSource(BACKEND_URL+"/stream");
  es.addEventListener("rows",ev=>{try{applyRows(JSON.parse(ev.data));}catch(e){}});
  es.onerror=()=>degrade();
 }catch(e){ degrade(); }
}
function degrade(){
 if(es){es.close();es=null;}
 if(live){live=false;updateBadges();}
 startStatic();  // 정적 폴링으로 강등 (에러 알림 없이 동작 지속)
 if(BACKEND_URL&&!retryTimer) retryTimer=setTimeout(()=>{retryTimer=null;connectLive();},30000);  // 30초 백오프
}

// 펀더멘털 — 병렬, 없으면 무시 (graceful degradation)
fetch("fundamentals.json",{cache:"no-store"})
 .then(r=>r.ok?r.json():null)
 .then(d=>{if(d&&d.items){FUND=d.items;DATA.forEach(mergeFund);render();}})
 .catch(()=>{});

if(BACKEND_URL) connectLive(); else startStatic();
</script>
