name: update-data

on:
  schedule:
    # KST 09:00~16:00 한국장 (UTC 0~7시), 평일
    - cron: "*/10 0-7 * * 1-5"
    # 미국장 09:30~16:00 ET (UTC 13~21시), 평일
    - cron: "*/10 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch quotes
        run: python fetch_data.py
      - name: Telegram alerts (신규 트리거만)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py     # HEAD(직전 커밋) vs 새 data.json 비교 — 커밋 전에 실행
      - name: Commit data.json
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
