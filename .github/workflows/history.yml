name: history

on:
  schedule:
    # 평일 1회 — 미국장 마감 후 (UTC 22:30 = KST 07:30)
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: history
  cancel-in-progress: true

jobs:
  history:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build history series
        run: WRITE_HISTORY=1 python fetch_data.py
      - name: Commit history
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          # data.json 은 update.yml(10분 크론) 소관 — history 는 docs/history 만 커밋해
          # data.json 충돌 없이 rebase 한다. fetch_data 가 쓴 data.json 변경은 버린다.
          git checkout -- docs/data.json || true
          git add docs/history
          git diff --cached --quiet && { echo "변경 없음"; exit 0; }
          git commit -m "history: daily series update"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i 실패 — 재시도"; sleep 3
          done
          echo "push 3회 실패"; exit 1
