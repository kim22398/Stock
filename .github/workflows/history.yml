name: history

on:
  schedule:
    # 평일 1회 — 미국장 마감 후 (UTC 22:30 = KST 07:30)
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: history
  cancel-in-progress: true

jobs:
  history:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build history series
        run: WRITE_HISTORY=1 python fetch_data.py
      - name: Commit history
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/history docs/data.json
          git diff --cached --quiet || git commit -m "history: daily series update"
          git pull --rebase origin main
          git push
