name: ci

on:
  push:
    # 데이터 봇(docs/*) 커밋엔 CI 불필요 — 코드 변경만 검사
    paths-ignore:
      - "docs/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install pytest ruff
      - name: Lint (lenient — real errors only)
        run: ruff check .
      - name: Tests
        run: pytest -q
